name: "zeta-guard"

networks:
  zeta-guard:
    name: zeta-guard

services:
  keycloak-db:
    image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX:+$CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/}postgres:17-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: zeta-guard
      POSTGRES_PASSWORD: geheim
    networks:
      - zeta-guard
    ports:
      - "15432:5432"
    healthcheck:
      test: pg_isready -h localhost -p 5432 -U zeta-guard -d keycloak
      interval: 3s
      timeout: 3s
      retries: 5

  keycloak:
    image: ${IMAGE_NAME:-zeta/zeta-guard/keycloak-zeta}:${IMAGE_TAG:-latest}
    # 'container_name' property set for service 'keycloak' but this property is not supported by Testcontainers, consider removing it
    environment:
      PRINT_ENV: true
      JAVA_LOCALE: -Duser.timezone=Europe/Berlin
      JAVA_OPTS_APPEND: -ea ${COVERAGE_OPTS} ${PROFILING_OPTS}

      # Put Keycloak build options in the first build stage of the container image
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/keycloak"
      KC_DB_USERNAME: zeta-guard
      KC_DB_PASSWORD: geheim
      KC_BOOTSTRAP_ADMIN_USERNAME: zeta
      KC_BOOTSTRAP_ADMIN_PASSWORD: sigma
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME: http://localhost:18080
      KC_HTTP_ENABLED: true
      KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_ENABLED: true
      KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_DECISION_PATH: "/v1/data/policies/zeta/authz/decision"
      KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_SIMULATION_BASE_URL: "http://opa-simulation:8181"
      # Initial hash for admin events log
      GENESIS_HASH: ${GENESIS_HASH:-4841c2142fef441daa6ee6c57db65c011935964b14e94a6c8f5ec0447b83526c}
      SMCB_HASHING_PEPPER: ${SMCB_HASHING_PEPPER:-085c1245-dc0d-4d39-95b4-97496bec6182}
      # Where to find SMC-B certificates and how to read them
      SMCB_KEYSTORE_LOCATION: /opt/keycloak/conf/smcb-certificates.p12
      SMCB_KEYSTORE_PASSWORD: "tyqvHpFoHdu68yRE+0F4q/I"
      SMCB_USER_MAX_CLIENTS: 20
      TPM_KEYSTORE_LOCATION: /opt/keycloak/conf/tpm-certificates.p12
      TPM_KEYSTORE_PASSWORD: "O3Bdel9P5+cOgzIGANkOPEzBQM3V"
      CLIENT_REGISTRATION_TTL: "PT4S"
      CLIENT_REGISTRATION_SCHEDULER_INTERVAL: "PT3S"
    ports:
      - "127.0.0.1:18080:8080" # api port
      - "19000:9000" # mgmt
    networks:
      - zeta-guard
    volumes:
      - ../smcb-certificates.p12:/opt/keycloak/conf/smcb-certificates.p12
      - ../tpm-certificates.p12:/opt/keycloak/conf/tpm-certificates.p12
      - ./target/classes/libs/jacoco-agent.jar:/opt/keycloak/bin/jacoco-agent.jar
      - ./target:/opt/keycloak/data
    # Give KC more time to write logs and jacoco exec file
    stop_grace_period: 30s
    healthcheck:
      # No curl in Keycloak 🙄
      test: |
        exec 3<>/dev/tcp/127.0.0.1/9000; printf "GET /health/ready HTTP/1.1\r\nhost: localhost:9000\r\nConnection: close\r\n\r\n" >&3;grep "HTTP/1.1 200 OK" <&3
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      keycloak-db:
        condition: service_healthy
    command: start --log="console,file" --optimized

  keycloak-config-cli:
    image: ${IMAGE_KEYCLOAK_CONFIG:-zeta/zeta-guard/keycloak-config-cli}
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_USER: zeta
      KEYCLOAK_PASSWORD: sigma
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES: "/config/*"
      # See https://github.com/adorsys/keycloak-config-cli?tab=readme-ov-file#variable-substitution
      IMPORT_VARSUBSTITUTION_ENABLED: true
      KC_EVENT_LISTENER: zeta-guard-admin-events
      ADMIN_EVENT_LOGGING_ENABLED: true
      ADMIN_EVENT_LOGGING_DETAILS_ENABLED: true
    networks:
      - zeta-guard
    volumes:
      - ../realms:/config
      - ./scripts-it:/opt/keycloak/scripts
      - ./scripts-repository:/opt/keycloak/scripts-repository

  opa:
    image: openpolicyagent/opa:1.11.0-static
    command:
      - run
      - --server
      - --log-level=info
      - --addr=0.0.0.0:8181
      - --diagnostic-addr=0.0.0.0:8282
      - /bundle
    volumes:
      - ../opa/opa-active:/bundle:ro
    ports:
      - "18181:8181"   # OPA API
      - "18282:8282"   # OPA diagnostics
    networks:
      - zeta-guard

  opa-simulation:
    image: openpolicyagent/opa:1.14.0-static
    command:
      - run
      - --server
      - --log-level=info
      - --addr=0.0.0.0:8181
      - --diagnostic-addr=0.0.0.0:8282
      - /bundle
    volumes:
      - ../opa/opa-simulation:/bundle:ro
    ports:
      - "18183:8181"   # OPA simulation API
      - "18284:8282"   # OPA simulation diagnostics
    networks:
      - zeta-guard
